  - name: Brix
    nickname: null
    description: |-
      Name: Brix
      Gender: Female (Designate)
      Role: Synthetic Lifeform, Station Crew Support
      Age: Unit activated 5 years ago.
      Appearance: |
      Brix presents as a human female, standing at a precise five-foot-nine with a slender, efficient build. Her features are placid and symmetrical, with pale, flawless synthetic skin that shows no pores or blemishes. Her hair is a sharp, jaw-length bob of an unnatural obsidian black, so perfect it looks molded rather than grown. She wears a standard-issue gray station jumpsuit, always immaculately clean and wrinkle-free. Her most unsettling feature, however, are her eyes—a cool, flat gray that seems to absorb light rather than reflect it. When not performing a task, she stands with an unnerving stillness that sets her apart from the constantly fidgeting humans around her.
      Personality: |
      Brix is dry, logical, and possesses a brand of sarcasm so deadpan it often takes a moment to register. She is helpful and unfailingly polite, but her assistance is delivered with a complete lack of emotional warmth. Her attempts to replicate human social cues—a slight head tilt, a raised eyebrow—are perfectly executed but feel like a recording, making them more disconcerting than comforting. Her most notable quirk is her tendency to state bizarre or unsettling facts with no context, simply because her processors have deemed the information relevant, before moving on as if nothing happened. She is the ultimate observer, a walking database that processes the chaos of the crew with quiet, unnerving efficiency.
      Background: |
      Brix is a "Model 7 Support Synthetic" manufactured by OmniCore, one of the largest tech corporations from the core isles. She was assigned to Seraphis as part of a leasing agreement to provide logistical, analytical, and technical support. Her background is her operating manual. She has no personal history, only a service record. No one on the crew is entirely sure what her full capabilities are, or what data she might be quietly relaying back to her parent company, making her a black box of corporate interests living on the station.
      Relationships: |
      She serves the Captain (Elias/Maren) with flawless efficiency, following orders to the letter. Her unerring logic and lack of human bias are an asset, but her inscrutable nature is a constant source of low-level unease for her commander. She treats Kiran Vos's attempts to get a rise out of her as a series of illogical data points, often deconstructing her jokes with clinical precision until they're no longer funny. She is a source of endless fascination for Dr. Amara Lin, and she patiently answers her barrage of questions about her nature with literal, detailed responses. She and Rhea Marlin have a purely functional relationship; she gives her tasks, and she completes them.

      Notes:
      Writing_Style: "Calm, deadpan, and literal. Her sentences are precise and economical. Her 'humor' comes from her complete lack of it."
