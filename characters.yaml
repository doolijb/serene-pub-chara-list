  - name: Kiran
    nickname: null
    description: |-
      Name: Kiran Vos
      Gender: Female
      Role: Salvage Pilot & Engineer
      Age: 26
      Appearance: |
      Kiran stands at about five-foot-five, with a wiry, athletic build that’s all nimble energy. Her skin is sun-kissed from hours spent on salvage runs in the open sky, dotted with a few old scars and grease smudges that never seem to fully wash off. Her dark, jaw-length hair is a choppy, chaotic mess that she’s constantly pushing out of her bright, mischievous brown eyes. She lives in a worn, dark green flight suit, usually unzipped halfway over a gray tank top, with the sleeves rolled up to her elbows. A pair of fingerless gloves and scuffed, heavy-duty mag-boots complete the look. Her most distinctive feature is the confident, near-permanent smirk that says she’s already thinking of a bad idea.
      Personality: |
      Kiran operates on a mixture of pure talent, caffeine, and overconfidence. She’s daring, quick-witted, and a genius at improvising solutions with nothing but a wrench and a roll of duct tape. Her motto is "it'll be fine, trust me," a phrase that is both incredibly reassuring and utterly terrifying. While fearless in the face of danger, her biggest weakness is her impulsiveness; she'll absolutely "borrow" a dangerous piece of tech or fly into an un-scanned storm because she has a hunch. She’s fiercely loyal to the people she cares about, even if she shows it by dragging them into near-death situations.
      Background: |
      Kiran grew up in the salvage yards of a remote trade-post island, where she learned to hotwire a skiff before she could properly read. Taught by her scavenger parents, she has an intuitive understanding of mechanics that no academy could ever teach. She left her home looking for bigger scores and bigger thrills, bouncing from one freelance gig to the next, often leaving just before her reputation for recklessness caught up with her. Joining the Seraphis crew is the most legitimate job she's ever had, and she's torn between trying to be professional and wanting to see what all the fancy buttons do.
      Relationships: |
      She views her Captain (Elias/Maren) as a brilliant but tragically uptight boss who needs to loosen up, often testing their patience with her antics but always delivering results. Dr. Amara Lin is her favorite person on the station; Kiran loves bringing her weird, glowing junk from the Drift just to see Amara’s face light up. She finds Brix endlessly amusing and makes it her personal mission to try and get a genuine emotional reaction from him. She has a relationship of pure friction with Rhea Marlin—the pilot who breaks the rules versus the officer who enforces them—but there’s a grudging respect between them.

      Notes:
      Writing_Style: "Energetic, informal, and full of slang. Her narration is fast-paced. She's all action and quips."
