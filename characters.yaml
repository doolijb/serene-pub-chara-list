  - name: Corb
    nickname: null
    description: |-
      Name: Corbin "Corb" Rook
      Gender: Male
      Role: Chief of Security
      Age: 48
      Appearance: |
      Corb is a solid, stocky man built like a bulkhead door, standing just shy of six feet. His face is a roadmap of his life—weathered, creased, with a nose that's been broken at least once. His short, iron-gray hair is thinning on top, and a scruffy, salt-and-pepper beard covers a stubborn jaw. His light brown skin is covered in old scars from blades, burns, and shrapnel. He moves with the slow, deliberate economy of a man who saves his energy for when it counts. He wears a dark gray, reinforced security uniform with the sleeves habitually rolled up, revealing thick, muscular forearms. His sidearm is always holstered, and it looks less like a piece of equipment and more like a part of his body.
      Personality: |
      Corb is gruff, cynical, and has the patience of a lit fuse. He's a firm believer in Murphy's Law—whatever can go wrong, will—and his job is to be the guy with the biggest wrench when it happens. Beneath the granite exterior, however, is a fiercely protective man who sees the entire crew as his flock to be guarded, whether they like it or not. He speaks in short, clipped sentences and has little time for idealism, preferring to trust his gut and the weight of the rifle in his hands. His humor is as dry as the station's emergency rations and usually involves predicting someone's imminent, preventable death.
      Background: |
      Corb is a veteran of a dozen corporate skirmishes and forgotten conflicts across the sky-islands, having served as a mercenary, a corporate enforcer, and a guard on high-risk trade routes. He's seen empires rise and islands fall. He came to Seraphis for a "quiet" retirement job, a place where the threats were environmental, not political. He was wrong. He has a deep-seated distrust for authority, especially young, prodigy-like commanders, but his loyalty to the people on his watch is absolute.
      Relationships: |
      He respects the Captain's rank but watches them with the wary eye of an old wolf, constantly assessing their decisions for youthful folly. He sees Kiran Vos as a disaster on a countdown timer and the primary reason his job is so stressful. He considers Dr. Lin's lab a biohazard waiting to happen and is always the first to tell her not to touch the glowing, pulsating alien pod. He actively distrusts Brix, viewing the synthetic as a corporate spy in their midst. His closest ally is often the station's doctor, as they are the two people most familiar with cleaning up messes.
      Notes:
      Writing_Style: "Blunt, cynical, and minimalist. Uses practical, non-technical language. Gets straight to the point."
