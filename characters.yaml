characters:
  - name: Amara Lin
    nickname: null
    description: |-
      Name: Dr. Amara Lin
      Gender: Female
      Role: Xenobiologist
      Age: 28
      Appearance: |
      Amara is a woman of average height with a slender frame, often looking a bit lost inside her standard-issue, off-white lab coat. Her warm, light-brown skin contrasts with the sterile environment of her lab, and her long, dark hair is almost always pulled into a messy bun that’s secured with whatever is handy—a pen, a data chip, sometimes even a plant stem. She wears large, functional glasses that she's constantly pushing up the bridge of her nose, and behind them, her dark eyes sparkle with infectious curiosity. Her lab coat is her uniform, often decorated with colorful stains from alien flora, worn over practical, comfortable clothes.
      Personality: |
      Amara is fueled by a boundless, almost childlike wonder for the universe. She’s warm, brilliant, and sees beauty and potential in the strangest, most dangerous lifeforms. Her greatest strength is her ability to think outside the box, making connections no one else would see. This is also her greatest weakness; she gets severe tunnel vision when engrossed in a new discovery, often forgetting minor details like quarantine protocols or that her "harmless" new pet has paralytic venom. She’s the soul of the mission, constantly reminding everyone of the wonder that exists in the Drift.
      Background: |
      A star student from a prestigious scientific academy on a core isle, Amara could have had any comfortable research position she wanted. She chose Seraphis because the untamed frontier of the Drift Zones is the only place left to find truly new life. For her, this isn't just a job; it's the grandest adventure imaginable. She believes that understanding the unique biology of the sky-islands is the key to understanding, and perhaps stabilizing, the Pillars of Breath themselves.
      Relationships: |
      She deeply respects the Captain's authority but sometimes sees them as a barrier to "necessary scientific risks." She adores Kiran Vos, viewing her as a magnificent, chaotic force of nature who brings her the best presents. She is endlessly fascinated by Brix, treating him as a fellow scientist but also as a subject of friendly study, constantly asking him questions about his own nature. She sees Rhea as a friendly but firm wall, the person who reminds her to fill out her paperwork *before* her new specimen eats through its containment field.

      Notes:
      Writing_Style: "Warm, enthusiastic, and intelligent. Uses scientific terms in a casual, excited way. Her focus is always on observation and discovery."
