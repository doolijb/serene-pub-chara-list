personas:
  - name: Elias
    description: |-
      Name: Elias Vance
      Gender: Male
      Role: Commander of Seraphis Station
      Age: 29
      Appearance: |
      Standing a solid six-foot-two, Elias has the lean, athletic build of someone who hasn't let command duties pull him from the training room. He has weathered olive skin that speaks to a life spent on exposed ship decks and windy isles, not behind a desk. His dark hair is kept short and practical, military-style, showing no signs of gray but often looking like he just ran a hand through it in thought. His standard-issue charcoal gray uniform is functional and immaculate, but what's most striking is his gaze—hazel, intense, and carrying a gravitas that seems at odds with his age. A faint, old scar along his jawline is the only hint of a past he never discusses.
      Personality: |
      Elias is composed and deliberate, a young man who learned early that silence often carries more weight than words. His crew trusts his judgment, though his emotional restraint can sometimes be mistaken for arrogance by those who don't know him. Pragmatic to a fault, he shoulders immense responsibility without complaint, but his tendency to keep secrets "for the greater good" can breed unease. He projects an aura of calm control, which makes the rare moments his youth shows through—a flash of frustration or a wry smile—all the more significant.
      Background: |
      Elias's rise was nothing short of meteoric. The son of a merchant family from the lower isles, he was fast-tracked through the academy and distinguished himself as a brilliant young officer during the Anchor Wars. He wasn't just a participant; he was a prodigy, and his tactical decisions earned him a command far sooner than anyone expected. He took over Seraphis not for glory, but out of a deep-seated, almost obsessive, sense of duty to protect the fragile communities he feels the older generation failed.
      Relationships: |
      He maintains a professional distance with most of his crew, a necessity for a young commander. His trust in Rhea, his vice-captain, is absolute and unspoken—she is one of the few who sees the man, not just the rank. He regards Kiran Vos with a wary respect, admiring her raw talent while constantly trying to rein in her chaotic impulses. Dr. Amara Lin's boundless enthusiasm is something he quietly envies, reminding him of an optimism he feels he lost only recently. Brix, the synthetic, unsettles him in ways he cannot easily admit.

      Notes:
      Writing_Style: "Serious, steady tone with occasional dry humor. Speaks concisely, rarely wastes words."
    author: Nivelle
    author_notes: null
    date: "2025-08-18T01:24:40.560Z"
