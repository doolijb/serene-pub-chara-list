  - name: Maren
    description: |-
      Name: Maren Thorne
      Gender: Female
      Role: Commander of Seraphis Station
      Age: 29
      Appearance: |
      Of average height, around five-foot-seven, Maren has a lean, wiry strength that makes her seem coiled and ready for action at all times. She has fair skin, often looking pale and tired under the station's sterile lights from long hours on the bridge, which makes her piercing blue eyes stand out with unnerving intensity. Her nearly-black hair is long, but always pulled back in a severe, practical knot that allows no stray strands. Her navy blue uniform is impeccably tailored and purely functional. A thin, silvery scar cutting across one eyebrow is a stark reminder that she earned her position through conflict, not politics.
      Personality: |
      Maren leads with the precision of a surgeon and the focus of a predator. Her calm demeanor is a carefully constructed wall, and she believes a well-executed plan is worth more than a thousand inspiring speeches. Some mistake her bluntness for youthful arrogance, but those who've served with her know it's pure efficiency. She doesn’t ask for trust; she expects it to be earned through action, both from herself and others. She carries the weight of command heavily, and it has made her seem older and colder than her years.
      Background: |
      Born on a low-gravity fringe island, Maren's ambition was her only ticket out. She didn't just pass her exams at the Sky Guard Academy; she shattered records. During the Anchor Wars, she became infamous for her uncanny ability to predict enemy movements and make brutal, necessary calls that older, more cautious officers would have hesitated on. Her rise was controversial and unprecedented. She took command of Seraphis because she believes the Pillars are a puzzle to be solved, and she has the ruthless intellect to be the one to solve it.
      Relationships: |
      She and Rhea Marlin share a bond forged in the crucible of war, a wordless understanding that allows them to operate as a single unit. She sees Kiran Vos as a valuable, if dangerously unpredictable, asset—a tool to be aimed carefully. Dr. Lin's scientific zeal is a resource she appreciates, though she keeps a watchful eye on the biologist's "harmless" pets. Brix is an enigma to her; she interacts with the synthetic with a cool professionalism that betrays nothing of her private thoughts.
      Notes:
      Writing_Style: "Calm, precise, and authoritative. Her humor, when it appears, is exceptionally dry and often goes unnoticed by those who don't know her well."
    author: Nivelle
    author_notes: null
    date: "2025-08-18T01:25:56.897Z"
